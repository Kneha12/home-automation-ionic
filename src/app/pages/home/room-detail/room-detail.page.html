<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="danger"></ion-back-button>
    </ion-buttons>
    <ion-title>{{room()?.name}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
 <ion-row>
  @for(device of devices(); track $index){
   <ion-col size="6">
    <app-device-card [device]="device"></app-device-card>
   </ion-col>
  }
 </ion-row>
</ion-content>
